
services:

  redis:
    image: redis:7
    container_name: rag-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

 
  backend:
    build:
      context: .
      dockerfile: backend.Dockerfile
    container_name: rag_backend
    ports:
      - "8000:8000"
    depends_on:
      - redis

  frontend:
    build:
      context: ./frontend
    container_name: rag_frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

    develop:
      watch:
        - action: sync+restart
          path: ./frontend/src
          target: /frontend/src


volumes:
  redis_data: